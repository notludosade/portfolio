<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2d0f6b"/>
      <stop offset="55%"  stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <!-- Crescent mask: white circle minus offset black circle -->
    <mask id="crescent">
      <rect width="32" height="32" fill="white"/>
      <circle cx="19.5" cy="13" r="8.2" fill="black"/>
    </mask>
  </defs>

  <!-- Rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Crescent moon — main circle minus cutout -->
  <circle cx="14" cy="17" r="9" fill="white" mask="url(#crescent)"/>
</svg>
